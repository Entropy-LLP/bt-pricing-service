name: deploy

# Pipeline on push to main:
#   1. tests   — npm ci, typecheck/build (tsc), unit tests (if any)
#   2. build   — docker image
#   3. smoke   — boot the built image and require GET /health == 200
#   4. push    — to Artifact Registry
#   5. deploy  — gcloud run deploy --image (existing env + runtime SA preserved)
# Auth to GCP is keyless via GitHub OIDC + Workload Identity Federation (no JSON key).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-bt-pricing-service
  cancel-in-progress: false

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      SERVICE: bt-pricing-service
      REGION: asia-south1
      PROJECT: project-aa0faf06-c115-438a-a36
    steps:
      - uses: actions/checkout@v4

      # 1. Rigorous tests: install, typecheck/build, unit tests (no-op until added)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install, typecheck & test
        run: |
          npm ci
          npm run build --if-present
          npm test --if-present

      # Keyless auth to GCP
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: project-aa0faf06-c115-438a-a36
          workload_identity_provider: projects/752385541585/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: bt-cicd-deployer@project-aa0faf06-c115-438a-a36.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2

      # 2. Build image
      - name: Build image
        run: |
          set -euo pipefail
          IMG="${REGION}-docker.pkg.dev/${PROJECT}/bt/${SERVICE}:${GITHUB_SHA}"
          echo "IMG=$IMG" >> "$GITHUB_ENV"
          docker build -t "$IMG" .

      # 3. Smoke test: the image must boot and serve /health (redis is real; other deps are dummy)
      - name: Smoke test
        run: |
          set -euo pipefail
          docker run -d --name smoke \
            --add-host=host.docker.internal:host-gateway \
            -p 8080:8080 \
            -e PORT=8080 -e NODE_ENV=production \
            -e SUPABASE_URL=https://ci-smoke.supabase.co \
            -e SUPABASE_SERVICE_ROLE_KEY=ci-smoke-dummy \
            -e JWT_SECRET=ci_smoke_jwt_secret_min_32_characters_long \
            -e JWT_REFRESH_SECRET=ci_smoke_refresh_secret_min_32_characters \
            -e REDIS_URL=redis://host.docker.internal:6379 \
            -e GOOGLE_MAPS_SERVER_KEY=ci-smoke-dummy \
            -e RAZORPAY_KEY_ID=ci-smoke -e RAZORPAY_KEY_SECRET=ci-smoke -e RAZORPAY_WEBHOOK_SECRET=ci-smoke \
            -e BLOCKCHAIN_ENABLED=false \
            "$IMG"
          ok=0
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8080/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 2
          done
          echo "----- container logs -----"; docker logs smoke || true
          docker rm -f smoke >/dev/null 2>&1 || true
          [ "$ok" = "1" ] || { echo "Smoke test failed: /health never returned 200"; exit 1; }
          echo "Smoke test passed."

      # 4. Push image
      - name: Push image
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          docker push "$IMG"

      # 5. Deploy to Cloud Run
      - name: Deploy
        run: |
          set -euo pipefail
          gcloud run deploy "$SERVICE" \
            --image "$IMG" \
            --region "$REGION" \
            --project "$PROJECT" \
            --quiet
